name: Keep Frida Hook - API 34 + Strip Native Libs
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  dump-enum-values:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        api-level: [34]
        target: [google_apis]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install frida-tools
        run: |
          pip install frida-tools
          frida --version
      - name: Prepare APK and Frida
        run: |
          # Download APK
          wget -q --timeout=120 "https://github.com/cwx8588/keep-frida-hook/releases/download/keep-apk-v8.6.20/keep_v8.6.20.apk" -O /tmp/keep.apk
          # Download Frida server (x86_64)
          wget -q --timeout=60 "https://github.com/frida/frida/releases/download/17.15.3/frida-server-17.15.3-android-x86_64.xz" -O /tmp/frida-server.xz
          xz -d /tmp/frida-server.xz -c > /tmp/frida-server && chmod +x /tmp/frida-server
          # Strip native ARM libs from APK to bypass ABI mismatch
          mkdir -p /tmp/keep_stripped
          cd /tmp/keep_stripped
          unzip -o /tmp/keep.apk >/dev/null 2>&1
          rm -rf lib/
          rm -rf META-INF/
          zip -r /tmp/keep_stripped.apk . >/dev/null 2>&1
          # Sign the stripped APK with debug key
          BUILD_TOOLS=$(ls -d /usr/local/lib/android/sdk/build-tools/* 2>/dev/null | tail -1)
          if [ -z "$BUILD_TOOLS" ]; then
            echo "Installing build-tools..."
            echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" >/dev/null 2>&1
            BUILD_TOOLS="/usr/local/lib/android/sdk/build-tools/34.0.0"
          fi
          echo "Using build-tools: $BUILD_TOOLS"
          # Generate debug keystore if needed
          KEYSTORE=$HOME/.android/debug.keystore
          if [ ! -f "$KEYSTORE" ]; then
            mkdir -p $HOME/.android
            keytool -genkey -v -keystore "$KEYSTORE" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
          fi
          $BUILD_TOOLS/apksigner sign --ks "$KEYSTORE" --ks-pass pass:android --ks-key-alias androiddebugkey --key-pass pass:android /tmp/keep_stripped.apk 2>&1
          ls -la /tmp/keep.apk /tmp/keep_stripped.apk /tmp/frida-server
      - name: Run Emulator + Frida
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb root && adb shell setenforce 0 && adb shell "echo 0 > /proc/sys/kernel/yama/ptrace_scope" 2>/dev/null || true
            adb push /tmp/frida-server /data/local/tmp/ && adb shell chmod 755 /data/local/tmp/frida-server
            adb install -r -d /tmp/keep_stripped.apk 2>&1; echo "INSTALL_RESULT=$?"
            adb shell /data/local/tmp/frida-server -D &
            sleep 5 && adb forward tcp:27042 tcp:27042
            MAIN_ACTIVITY=$(adb shell pm resolve-activity --brief com.gotokeep.keep 2>/dev/null | tail -1); echo "MAIN_ACTIVITY=[$MAIN_ACTIVITY]"
            adb shell am start -n "$MAIN_ACTIVITY"; sleep 10
            adb shell am start -d "keep://open/login"; sleep 5
            KEEP_PID=$(adb shell pidof com.gotokeep.keep 2>/dev/null | tr -d '\r\n'); echo "KEEP_PID=[$KEEP_PID]"
            if [ -z "$KEEP_PID" ]; then adb shell ps | grep keep || echo "App not running!"; exit 1; fi
            timeout 60 frida -U --attach-pid "$KEEP_PID" -l $GITHUB_WORKSPACE/frida_hook.js -o /tmp/frida_output.txt <<< "exit" 2>&1 || true
            echo "=== RESULTS ===" && cat /tmp/frida_output.txt 2>/dev/null || echo "No output"
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frida-results
          path: /tmp/frida_output*.txt
          retention-days: 90
